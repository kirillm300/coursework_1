networks:
  carwash-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:

services:

  simulator:
    build:
      context: ./simulator
    container_name: carwash-simulator
    ports:
      - "8000:8000"
    networks:
      - carwash-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: carwash-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - carwash-net
    depends_on:
      - simulator
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: carwash-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - carwash-net
    depends_on:
      - prometheus
    restart: unless-stopped
