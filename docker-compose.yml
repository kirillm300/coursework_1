version: "3.9"

networks:
  carwash-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  postgres-data:

services:

  simulator:
    build:
      context: ./simulator
    container_name: carwash-simulator
    ports:
      - "8000:8000"
    networks:
      - carwash-net
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: carwash-postgres
    environment:
      POSTGRES_DB: carwash
      POSTGRES_USER: carwash_user
      POSTGRES_PASSWORD: carwash_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - carwash-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: carwash-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - carwash-net
    depends_on:
      - simulator
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: carwash-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    networks:
      - carwash-net
    depends_on:
      - prometheus
    restart: unless-stopped

  alertmanager:
      image: prom/alertmanager:latest
      container_name: carwash-alertmanager
      ports:
        - "9093:9093"
      volumes:
        - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      networks:
        - carwash-net
      restart: unless-stopped